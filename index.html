<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trình Trích Xuất Source Code</title>
    <style>
        /* Tổng quan */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Container bo góc với viền gradient xanh - hồng */
        .container {
            background: linear-gradient(135deg, #00ff88 0%, #ff007f 100%);
            padding: 3px;
            border-radius: 24px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .content {
            background-color: #1c1c1e;
            border-radius: 22px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h2 {
            margin: 0;
            text-align: center;
            font-size: 20px;
        }

        /* Ô nhập URL */
        input[type="url"] {
            width: 100%;
            padding: 12px;
            background: #2c2c2e;
            border: 1px solid #3a3a3c;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s ease;
        }

        input[type="url"]:focus {
            border-color: #00ff88;
        }

        /* Nút bấm animation mượt */
        button {
            background: #00ff88;
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.25, 0.8, 0.25, 1), background-color 0.3s;
        }

        button:active {
            transform: scale(0.96);
            background: #ff007f;
            color: white;
        }

        /* Khu vực hiển thị code */
        .code-box {
            background: #000000;
            border-radius: 14px;
            padding: 15px;
            height: 200px;
            overflow-y: auto; /* Cho phép cuộn trên mobile */
            font-family: monospace;
            font-size: 12px;
            color: #a1a1aa;
            white-space: pre-wrap; /* Giữ nguyên định dạng xuống dòng */
            word-wrap: break-word;
        }

        .label {
            font-weight: bold;
            color: #ff007f;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .label.html-label {
            color: #00ff88;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="content">
            <h2>Web Code Fetcher</h2>
            
            <input type="url" id="urlInput" placeholder="Nhập link (VD: https://example.com)">
            <button onclick="fetchSourceCode()">Lấy Code</button>

            <div>
                <div class="label html-label">📝 HTML Source:</div>
                <div id="htmlOutput" class="code-box">Mã HTML sẽ hiện ở đây...</div>
            </div>

            <div>
                <div class="label">🎨 CSS (Thẻ <style>):</div>
                <div id="cssOutput" class="code-box">Mã CSS sẽ hiện ở đây...</div>
            </div>
        </div>
    </div>

    <script>
        async function fetchSourceCode() {
            const urlInput = document.getElementById('urlInput').value;
            const htmlOutput = document.getElementById('htmlOutput');
            const cssOutput = document.getElementById('cssOutput');

            if (!urlInput.startsWith('http://') && !urlInput.startsWith('https://')) {
                alert('Vui lòng nhập link hợp lệ bắt đầu bằng http:// hoặc https://');
                return;
            }

            htmlOutput.textContent = 'Đang tải dữ liệu...';
            cssOutput.textContent = 'Đang tải dữ liệu...';

            // Sử dụng AllOrigins làm CORS Proxy để vượt tường lửa trình duyệt
            const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(urlInput)}`;

            try {
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                if (data.contents) {
                    const htmlString = data.contents;
                    
                    // 1. Hiển thị toàn bộ mã HTML
                    htmlOutput.textContent = htmlString;

                    // 2. Trích xuất mã CSS từ các thẻ <style> bên trong HTML
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(htmlString, 'text/html');
                    const styleTags = doc.querySelectorAll('style');
                    
                    let cssContent = '';
                    styleTags.forEach((style, index) => {
                        cssContent += `/* Block Style ${index + 1} */\n`;
                        cssContent += style.innerHTML.trim() + '\n\n';
                    });

                    if (cssContent === '') {
                        cssOutput.textContent = 'Không tìm thấy CSS nội tuyến (thẻ <style>). CSS của trang này có thể nằm trong file .css bên ngoài.';
                    } else {
                        cssOutput.textContent = cssContent;
                    }
                } else {
                    htmlOutput.textContent = 'Không thể lấy dữ liệu từ trang này.';
                    cssOutput.textContent = '';
                }
            } catch (error) {
                htmlOutput.textContent = 'Lỗi kết nối: ' + error.message;
                cssOutput.textContent = '';
            }
        }
    </script>

</body>
</html>
